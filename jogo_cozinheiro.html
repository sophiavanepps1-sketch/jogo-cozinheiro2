<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jogo do Cozinheiro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f9fc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 2rem; }
    h1 { text-align: center; font-size: 22px; font-weight: 700; color: #1a2a4a; margin-bottom: 0.8rem; }
    #score-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 0.9rem; }
    .dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #bbb; background: #e8e8e8; transition: background 0.3s; }
    .dot.correct { background: #3B6D11; border-color: #3B6D11; }
    #arena { display: flex; gap: 1.2rem; align-items: flex-start; justify-content: center; flex-wrap: wrap; }
    #chef-wrap { width: 200px; height: 265px; border-radius: 14px; border: 2.5px dashed #aac; background: #e8f4fb; overflow: hidden; position: relative; transition: border-color 0.2s, background 0.2s; flex-shrink: 0; }
    #chef-wrap.over { border-color: #1D9E75; background: rgba(29,158,117,0.10); }
    #chef-wrap > svg:first-child { width: 100%; height: 100%; display: block; pointer-events: none; }
    #placed { position: absolute; inset: 0; pointer-events: none; }
    .placed-item { position: absolute; width: 60px; height: 60px; animation: pop 0.3s ease; }
    .placed-item svg { width: 100%; height: 100%; }
    @keyframes pop { 0%{transform:scale(0.4)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
    #objects-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 220px; }
    .obj-card { width: 105px; height: 105px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; border-radius: 12px; border: 1.5px solid #dde; background: #fff; cursor: grab; transition: opacity 0.2s, transform 0.15s, box-shadow 0.15s; padding: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
    .obj-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.13); transform: translateY(-2px); }
    .obj-card:active { cursor: grabbing; }
    .obj-card.dragging { opacity: 0.3; }
    .obj-card.used { opacity: 0.18; pointer-events: none; }
    .obj-card svg { width: 64px; height: 64px; pointer-events: none; }
    .obj-label { font-size: 11px; color: #667; text-align: center; font-weight: 500; }
    #feedback { min-height: 44px; text-align: center; margin-top: 0.8rem; font-size: 15px; font-weight: 600; }
    #feedback.ok { color: #3B6D11; }
    #feedback.err { color: #A32D2D; }
    #confetti-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
    #restart-btn { display: none; margin: 0.5rem auto 0; padding: 8px 24px; border-radius: 8px; border: 1.5px solid #bbb; background: #f0f0f0; color: #333; font-size: 14px; cursor: pointer; font-weight: 500; }
    #restart-btn:hover { background: #e0e0e0; }
  </style>
</head>
<body>

<h1>🍳 Ajuda o Cozinheiro!</h1>
<div id="score-bar">
  <div class="dot" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
</div>
<div id="arena">
  <div id="chef-wrap">
    <svg viewBox="0 0 200 265" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="265" fill="#e8f4fb" rx="12"/>
      <!-- Legs -->
      <rect x="70" y="182" width="22" height="62" rx="10" fill="#2c3e7a"/>
      <rect x="108" y="182" width="22" height="62" rx="10" fill="#2c3e7a"/>
      <!-- Shoes -->
      <ellipse cx="81" cy="244" rx="16" ry="8" fill="#222"/>
      <ellipse cx="119" cy="244" rx="16" ry="8" fill="#222"/>
      <!-- Body -->
      <rect x="58" y="108" width="84" height="80" rx="18" fill="#3a72d4"/>
      <!-- Buttons -->
      <circle cx="100" cy="121" r="3" fill="white" opacity="0.85"/>
      <circle cx="100" cy="133" r="3" fill="white" opacity="0.85"/>
      <circle cx="100" cy="145" r="3" fill="white" opacity="0.85"/>
      <!-- Collar -->
      <polygon points="88,108 100,124 78,114" fill="white" opacity="0.9"/>
      <polygon points="112,108 100,124 122,114" fill="white" opacity="0.9"/>
      <!-- Arms -->
      <rect x="32" y="112" width="30" height="18" rx="9" fill="#3a72d4"/>
      <rect x="138" y="112" width="30" height="18" rx="9" fill="#3a72d4"/>
      <!-- Hands -->
      <circle cx="30" cy="121" r="11" fill="#FFDBB5"/>
      <circle cx="170" cy="121" r="11" fill="#FFDBB5"/>
      <!-- Neck -->
      <rect x="86" y="96" width="28" height="16" rx="7" fill="#FFDBB5"/>
      <!-- Head -->
      <ellipse cx="100" cy="74" rx="36" ry="34" fill="#FFDBB5"/>
      <!-- Ears -->
      <ellipse cx="64" cy="74" rx="9" ry="11" fill="#FFDBB5"/>
      <ellipse cx="136" cy="74" rx="9" ry="11" fill="#FFDBB5"/>
      <ellipse cx="64" cy="74" rx="5.5" ry="7" fill="#f5c9a0"/>
      <ellipse cx="136" cy="74" rx="5.5" ry="7" fill="#f5c9a0"/>
      <!-- Hat -->
      <rect x="74" y="30" width="52" height="24" rx="4" fill="white"/>
      <ellipse cx="100" cy="30" rx="36" ry="20" fill="white"/>
      <ellipse cx="100" cy="13" rx="27" ry="18" fill="white"/>
      <rect x="70" y="47" width="60" height="11" rx="3" fill="#ddd"/>
      <rect x="70" y="47" width="60" height="5" rx="2" fill="#3a72d4" opacity="0.45"/>
      <!-- Eyes -->
      <ellipse cx="85" cy="72" rx="11" ry="12" fill="white"/>
      <ellipse cx="115" cy="72" rx="11" ry="12" fill="white"/>
      <circle cx="87" cy="73" r="7" fill="#1a3a8a"/>
      <circle cx="117" cy="73" r="7" fill="#1a3a8a"/>
      <circle cx="89" cy="71" r="3" fill="#000"/>
      <circle cx="119" cy="71" r="3" fill="#000"/>
      <circle cx="91" cy="69" r="1.8" fill="white"/>
      <circle cx="121" cy="69" r="1.8" fill="white"/>
      <!-- Eyebrows -->
      <path d="M75 59 Q85 53 95 59" stroke="#8B5E3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M105 59 Q115 53 125 59" stroke="#8B5E3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Smile -->
      <path d="M80 87 Q100 102 120 87" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M84 90 Q100 100 116 90 Q100 97 84 90" fill="white"/>
      <!-- Cheeks -->
      <ellipse cx="72" cy="83" rx="9" ry="6" fill="#ffaaaa" opacity="0.45"/>
      <ellipse cx="128" cy="83" rx="9" ry="6" fill="#ffaaaa" opacity="0.45"/>
      <!-- Nose -->
      <ellipse cx="100" cy="81" rx="4.5" ry="3.5" fill="#f0a882"/>
    </svg>
    <div id="placed"></div>
    <svg id="confetti-layer" viewBox="0 0 200 265" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="objects-panel"></div>
</div>
<div id="feedback"></div>
<button id="restart-btn" onclick="restart()">&#8635; Recomeçar</button>

<script>
const SVGS = {
  frigideira: `<svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="27" cy="36" rx="21" ry="15" fill="#C0392B"/>
    <ellipse cx="27" cy="36" rx="18" ry="12" fill="#1a1a1a"/>
    <ellipse cx="27" cy="36" rx="13" ry="8" fill="#2d2d2d"/>
    <rect x="45" y="32" width="14" height="6" rx="3" fill="#666"/>
    <rect x="45" y="32" width="4" height="6" rx="2" fill="#444"/>
    <circle cx="24" cy="33" r="2" fill="#444"/>
    <circle cx="30" cy="37" r="1.5" fill="#444"/>
  </svg>`,
  faca: `<svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg">
    <rect x="28" y="7" width="7" height="22" rx="3" fill="#C8A96E"/>
    <rect x="28" y="7" width="7" height="5" rx="1" fill="#9a7a45"/>
    <rect x="29" y="9" width="2" height="18" rx="1" fill="#dbb87a" opacity="0.5"/>
    <rect x="29" y="28" width="5" height="3" rx="0" fill="#777"/>
    <polygon points="30,31 34,31 37,56 26,56" fill="#c8c8c8"/>
    <polygon points="34,31 37,56 32,50" fill="#a0a0a0"/>
    <line x1="31" y1="35" x2="36" y2="54" stroke="#e0e0e0" stroke-width="0.8" opacity="0.6"/>
  </svg>`,
  colher: `<svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg">
    <rect x="28" y="27" width="6" height="28" rx="3" fill="#B8741A"/>
    <rect x="29" y="28" width="2" height="25" rx="1" fill="#d4902a" opacity="0.5"/>
    <ellipse cx="31" cy="20" rx="10" ry="12" fill="#C87A1A"/>
    <ellipse cx="31" cy="21" rx="7.5" ry="9" fill="#8B5010"/>
    <ellipse cx="29" cy="19" rx="3" ry="4" fill="#a06020" opacity="0.4"/>
  </svg>`,
  computador: `<svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg">
    <rect x="7" y="8" width="48" height="34" rx="4" fill="#b0b8c8"/>
    <rect x="9" y="10" width="44" height="30" rx="3" fill="#d8dfe8"/>
    <rect x="10" y="11" width="42" height="28" rx="2" fill="#5b8dd9"/>
    <rect x="12" y="13" width="10" height="7" rx="1" fill="white" opacity="0.3"/>
    <rect x="24" y="42" width="14" height="5" rx="1" fill="#a0a8b8"/>
    <rect x="17" y="47" width="28" height="4" rx="2" fill="#9098a8"/>
    <rect x="11" y="43" width="6" height="3" rx="1" fill="#b0b8c8"/>
    <rect x="45" y="43" width="6" height="3" rx="1" fill="#b0b8c8"/>
  </svg>`,
  baseball: `<svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg">
    <circle cx="31" cy="31" r="22" fill="#F5E6C8"/>
    <circle cx="31" cy="31" r="22" fill="none" stroke="#ddd" stroke-width="1.5"/>
    <path d="M22 11 Q17 22 19 31 Q17 40 22 51" fill="none" stroke="#C0392B" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M40 11 Q45 22 43 31 Q45 40 40 51" fill="none" stroke="#C0392B" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M22 17 L27 19 M21 24 L26 26 M21 31 L26 33 M21 38 L26 40 M22 45 L27 47" stroke="#C0392B" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M40 17 L35 19 M41 24 L36 26 M41 31 L36 33 M41 38 L36 40 M40 45 L35 47" stroke="#C0392B" stroke-width="1.2" stroke-linecap="round"/>
  </svg>`,
  telescopio: `<svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg">
    <line x1="31" y1="44" x2="21" y2="57" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="31" y1="44" x2="41" y2="57" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="21" y1="57" x2="41" y2="57" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <circle cx="31" cy="44" r="3.5" fill="#555"/>
    <g transform="rotate(-35 31 30)">
      <rect x="8" y="25" width="46" height="12" rx="6" fill="#5577aa"/>
      <rect x="8" y="25" width="15" height="12" rx="6" fill="#3a5a8a"/>
      <rect x="37" y="26" width="17" height="10" rx="5" fill="#4466aa"/>
      <ellipse cx="54" cy="31" rx="5.5" ry="6" fill="#88aacc"/>
      <ellipse cx="54" cy="31" rx="3.5" ry="4" fill="#aaccee"/>
      <ellipse cx="54" cy="31" rx="1.5" ry="2" fill="#cce8ff"/>
    </g>
  </svg>`
};

const items = [
  { id:'frigideira', label:'Frigideira',   correct:true  },
  { id:'faca',       label:'Faca',          correct:true  },
  { id:'colher',     label:'Colher de pau', correct:true  },
  { id:'computador', label:'Computador',    correct:false },
  { id:'baseball',   label:'Baseball',      correct:false },
  { id:'telescopio', label:'Telescópio',    correct:false },
];

const placedPositions = [
  {top:'5%',  left:'4%'},
  {top:'5%',  right:'4%'},
  {top:'48%', left:'50%', transform:'translateX(-50%)'},
];

let correctCount=0, dragId=null, placedCount=0;

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b; }

function build() {
  const panel = document.getElementById('objects-panel');
  panel.innerHTML = '';
  shuffle(items).forEach(item => {
    const card = document.createElement('div');
    card.className = 'obj-card';
    card.id = 'card-' + item.id;
    card.draggable = true;
    card.dataset.id = item.id;
    card.innerHTML = SVGS[item.id] + '<span class="obj-label">' + item.label + '</span>';
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend', onDragEnd);
    card.addEventListener('touchstart', onTouchStart, {passive:false});
    panel.appendChild(card);
  });
}

function onDragStart(e) {
  dragId = e.currentTarget.dataset.id;
  setTimeout(() => { const c=document.getElementById('card-'+dragId); if(c) c.classList.add('dragging'); }, 0);
}
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); }

const chefWrap = document.getElementById('chef-wrap');
chefWrap.addEventListener('dragover',  e => { e.preventDefault(); chefWrap.classList.add('over'); });
chefWrap.addEventListener('dragleave', () => chefWrap.classList.remove('over'));
chefWrap.addEventListener('drop',      e => { e.preventDefault(); chefWrap.classList.remove('over'); handleDrop(dragId); });

let tClone=null, tEl=null;
function onTouchStart(e) {
  e.preventDefault();
  tEl=e.currentTarget; dragId=tEl.dataset.id;
  const r=tEl.getBoundingClientRect();
  tClone=tEl.cloneNode(true);
  tClone.style.cssText='position:fixed;top:'+r.top+'px;left:'+r.left+'px;width:'+r.width+'px;height:'+r.height+'px;opacity:0.75;z-index:1000;pointer-events:none;border-radius:12px;background:#fff;border:1.5px solid #dde;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:6px;';
  document.body.appendChild(tClone);
  tEl.classList.add('dragging');
  document.addEventListener('touchmove', onTouchMove, {passive:false});
  document.addEventListener('touchend', onTouchEnd);
}
function onTouchMove(e) {
  e.preventDefault();
  const t=e.touches[0];
  if(tClone){tClone.style.left=(t.clientX-52)+'px';tClone.style.top=(t.clientY-52)+'px';}
  const r=chefWrap.getBoundingClientRect();
  if(t.clientX>r.left&&t.clientX<r.right&&t.clientY>r.top&&t.clientY<r.bottom) chefWrap.classList.add('over');
  else chefWrap.classList.remove('over');
}
function onTouchEnd(e) {
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend', onTouchEnd);
  chefWrap.classList.remove('over');
  if(tClone){tClone.remove();tClone=null;}
  if(tEl) tEl.classList.remove('dragging');
  const t=e.changedTouches[0];
  const r=chefWrap.getBoundingClientRect();
  if(t.clientX>r.left&&t.clientX<r.right&&t.clientY>r.top&&t.clientY<r.bottom) handleDrop(dragId);
}

function handleDrop(id) {
  const item=items.find(i=>i.id===id);
  if(!item) return;
  const card=document.getElementById('card-'+id);
  if(card&&card.classList.contains('used')) return;
  const fb=document.getElementById('feedback');
  if(item.correct) {
    if(card) card.classList.add('used');
    placeItem(id);
    document.getElementById('d'+correctCount).classList.add('correct');
    correctCount++;
    if(correctCount===3){ fb.textContent='🎉 Parabéns! O cozinheiro está pronto!'; fb.className='ok'; celebrate(); }
    else { fb.textContent='✅ Correto! Continua!'; fb.className='ok'; }
  } else {
    fb.textContent='❌ Esse objeto não pertence ao cozinheiro!';
    fb.className='err';
    document.getElementById('restart-btn').style.display='block';
    if(card) shakeCard(card);
  }
}

function placeItem(id) {
  const placed=document.getElementById('placed');
  const pos=placedPositions[placedCount%placedPositions.length];
  const el=document.createElement('div');
  el.className='placed-item';
  Object.assign(el.style, pos);
  el.innerHTML=SVGS[id];
  placed.appendChild(el);
  placedCount++;
}

function shakeCard(card) {
  let t=0; const seq=[7,-7,5,-5,3,-3,0];
  const run=()=>{ if(t<seq.length){card.style.transform='translateX('+seq[t]+'px)';t++;setTimeout(run,75);}else{card.style.transform='';} };
  run();
}

function celebrate() {
  const cl=document.getElementById('confetti-layer');
  const colors=['#1D9E75','#D85A30','#378ADD','#BA7517','#D4537E','#7F77DD'];
  const pieces=Array.from({length:50},()=>({
    x:10+Math.random()*180, y:-8,
    w:5+Math.random()*7, h:3+Math.random()*5,
    color:colors[Math.floor(Math.random()*colors.length)],
    vy:1.5+Math.random()*3, vx:(Math.random()-0.5)*2.5,
    rot:Math.random()*360, rv:(Math.random()-0.5)*10
  }));
  let frame=0;
  const draw=()=>{
    cl.innerHTML='';
    pieces.forEach(p=>{
      const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
      r.setAttribute('x',p.x); r.setAttribute('y',p.y);
      r.setAttribute('width',p.w); r.setAttribute('height',p.h);
      r.setAttribute('fill',p.color); r.setAttribute('rx','1');
      r.setAttribute('transform','rotate('+p.rot+' '+(p.x+p.w/2)+' '+(p.y+p.h/2)+')');
      cl.appendChild(r);
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rv;
    });
    frame++;
    if(frame<200) requestAnimationFrame(draw);
    else cl.innerHTML='';
  };
  draw();
}

function restart() {
  correctCount=0; placedCount=0; dragId=null;
  document.getElementById('placed').innerHTML='';
  document.getElementById('confetti-layer').innerHTML='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';
  document.getElementById('restart-btn').style.display='none';
  for(let i=0;i<3;i++) document.getElementById('d'+i).classList.remove('correct');
  build();
}

build();
</script>
</body>
</html>
